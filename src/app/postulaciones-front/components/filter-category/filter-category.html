<div class="card bg-base-100 shadow-sm border border-base-300">
  <div class="card-body">
    <div class="flex flex-col md:flex-row md:items-center gap-4">
      <div class="flex-1">
        <h3 class="font-semibold">Filtrar por Area</h3>
        <p class="text-sm text-base-content/70">
          Selecciona una Area para encontrar oportunidades específicas.
        </p>
      </div>

      <select
        class="select select-bordered"
        (change)="categoriaChange.emit($any($event.target).value)"
      >
        <option value="">Todas</option>
        <option value="Desarrollo de Software">Desarrollo de Software</option>

        @for (cat of categoriasResource.value() ?? []; track cat.id) {
          <option [value]="cat.nombre">
            {{ cat.nombre }}
          </option>
        }
      </select>
    </div>
  </div>
</div>
