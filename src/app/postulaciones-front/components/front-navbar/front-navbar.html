<div class="navbar bg-base-100 shadow-md px-4">
  <!-- Logo -->
  <div class="navbar-start">
    <a routerLink="/" class="text-xl font-bold font-montserrat">
      Municipalidad
      <span class="text-secondary"> | Post CV</span>
    </a>
  </div>

  <!-- Menú móvil -->
  <div class="navbar-end lg:hidden">
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </div>

      <ul
        tabindex="0"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow-lg"
      >
        <li>
          <a routerLink="/auth/register">Registrar</a>
        </li>
        <li>
          <a routerLink="/auth/login">Entrar</a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Menú desktop -->
  <div class="navbar-end hidden lg:flex gap-3">
    <!--  -->
    @if (authService.authStatus() != 'authenticated') {
      <a routerLink="/posts" class="btn btn-info rounded-full px-6"> Puestos Disponibles </a>

      <a routerLink="/auth/register" class="btn btn-outline btn-primary rounded-full px-6">
        Registrar
      </a>
      <a routerLink="/auth/login" class="btn btn-primary rounded-full px-6"> Entrar </a>
    }
    @if (authService.authStatus() == 'authenticated') {
      <p>
        Bienvenido <span>{{ authService.user()?.nombres }} </span>
      </p>
      <a routerLink="/posts" class="btn btn-info rounded-full px-6"> Puestos Disponibles </a>
      <a routerLink="/postulaciones" class="btn btn-secondary">Postulaciones</a>

      <a (click)="authService.logout()" class="btn btn-primary rounded-full px-6"> Logout </a>
    }
  </div>
</div>
